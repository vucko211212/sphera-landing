name: Deploy to Vercel

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }} --scope ${{ secrets.VERCEL_SCOPE }}

      - name: Point sphera-omega.vercel.app to latest deploy
        run: |
          DEPLOY_ID=$(curl -s \
            "https://api.vercel.com/v6/deployments?teamId=${{ secrets.VERCEL_SCOPE }}&limit=1" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['deployments'][0]['uid'])")
          echo "Deploy ID: $DEPLOY_ID"
          curl -s -X POST \
            "https://api.vercel.com/v2/deployments/$DEPLOY_ID/aliases?teamId=${{ secrets.VERCEL_SCOPE }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"alias":"sphera-omega.vercel.app"}'
